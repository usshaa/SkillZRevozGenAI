<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Multimodal AI Simulation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fc;--bg2:#ffffff;--bg3:#f0f2f8;--bg4:#e8eaf4;
  --border:#dde1f0;--border2:#c8ceea;
  --text:#1a1d2e;--text2:#5a5f7a;--text3:#9099b8;
  --blue:#2563eb;--blue-dim:#dbeafe;--blue-glow:rgba(37,99,235,0.08);
  --teal:#0d9488;--teal-dim:#ccfbf1;
  --amber:#d97706;--amber-dim:#fef3c7;
  --purple:#7c3aed;--purple-dim:#ede9fe;
  --coral:#dc2626;--coral-dim:#fee2e2;
  --green:#16a34a;--green-dim:#dcfce7;
  --pink:#db2777;--pink-dim:#fce7f3;
  --font-head:'Syne',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

body{
  font-family:var(--font-mono);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:20px;
}

.sim{max-width:760px;padding:0}

/* ── header ── */
.sim-header{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:18px;border-bottom:1px solid var(--border);
  padding-bottom:14px;
}
.sim-title{
  font-family:var(--font-head);font-size:17px;font-weight:800;
  color:var(--text);letter-spacing:-.3px;
}
.sim-badge{
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  padding:2px 8px;border-radius:2px;background:var(--blue-dim);
  color:var(--blue);border:1px solid var(--border2);text-transform:uppercase;
}

/* ── modality picker ── */
.modality-bar{display:flex;gap:0;margin-bottom:18px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.mod-btn{
  flex:1;padding:8px 6px;font-family:var(--font-mono);font-size:11px;font-weight:500;
  background:var(--bg2);color:var(--text2);border:none;cursor:pointer;
  border-right:1px solid var(--border);transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.mod-btn:last-child{border-right:none}
.mod-btn.active{background:var(--blue-dim);color:var(--blue)}
.mod-btn .mod-icon{font-size:16px}
.mod-btn .mod-label{font-size:10px;letter-spacing:.5px}

/* ── stage nav ── */
.stage-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.stage-btn{
  padding:5px 10px;border:1px solid var(--border);border-radius:3px;
  background:var(--bg2);color:var(--text2);font-family:var(--font-mono);
  font-size:10px;cursor:pointer;transition:all .18s;
  white-space:nowrap;
}
.stage-btn.active{
  background:var(--blue-dim);color:var(--blue);
  border-color:var(--blue);
}
.stage-btn:hover:not(.active){background:var(--bg3);color:var(--text)}

/* ── panel ── */
.panel{display:none;animation:fadeIn .28s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── info-bar ── */
.info-bar{
  background:var(--bg3);border-left:2px solid var(--blue);
  padding:10px 14px;border-radius:0 3px 3px 0;
  font-size:11.5px;color:var(--text2);margin-bottom:14px;
  line-height:1.7;letter-spacing:.01em;
}
.info-bar strong{color:var(--text)}
.info-bar code{
  font-family:var(--font-mono);font-size:11px;
  background:var(--bg4);padding:1px 5px;border-radius:2px;color:var(--blue);
}

/* ── section title ── */
.sec{font-family:var(--font-head);font-size:12px;font-weight:700;
  color:var(--text2);text-transform:uppercase;letter-spacing:2px;
  margin:12px 0 8px;}

/* ── file drop zone ── */
.drop-zone{
  border:1.5px dashed var(--border2);border-radius:4px;
  padding:20px;text-align:center;cursor:pointer;
  background:var(--bg2);transition:all .2s;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.drop-zone:hover{border-color:var(--blue);background:var(--blue-glow)}
.drop-zone .dz-icon{font-size:26px;margin-bottom:6px}
.drop-zone .dz-label{font-size:12px;color:var(--text2)}
.drop-zone .dz-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* ── chips ── */
.chip{display:inline-block;padding:2px 8px;border-radius:2px;
  font-size:11px;font-weight:500;margin:2px;font-family:var(--font-mono)}
.chip-blue{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
.chip-teal{background:#ccfbf1;color:#0f766e;border:1px solid #99f6e4}
.chip-amber{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
.chip-purple{background:#ede9fe;color:#6d28d9;border:1px solid #ddd6fe}
.chip-coral{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
.chip-green{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.chip-pink{background:#fce7f3;color:#be185d;border:1px solid #fbcfe8}

/* ── two-col ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.two-col{grid-template-columns:1fr}}

/* ── table ── */
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{
  padding:6px 10px;text-align:left;color:var(--text2);
  border-bottom:1px solid var(--border);font-weight:500;
  font-family:var(--font-head);font-size:11px;letter-spacing:.5px;
}
.data-table td{
  padding:6px 10px;color:var(--text);border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg3)}

/* ── output box ── */
.output-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:3px;
  padding:12px;font-size:12px;color:var(--text);min-height:50px;
  line-height:1.8;margin-top:8px;position:relative;
}
.output-box .cursor{
  display:inline-block;width:7px;height:13px;
  background:var(--blue);vertical-align:text-bottom;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── qa row ── */
.qa-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.qa-label{min-width:56px;font-size:10px;font-weight:500;
  color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.qa-inp{
  flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:3px;
  font-size:12px;font-family:var(--font-mono);
  background:var(--bg2);color:var(--text);outline:none;
  transition:border-color .2s;
}
.qa-inp:focus{border-color:var(--blue)}
.run-btn{
  padding:7px 14px;border:1px solid var(--blue);border-radius:3px;
  background:var(--blue-dim);color:var(--blue);font-size:11px;
  font-family:var(--font-mono);cursor:pointer;white-space:nowrap;
  transition:all .2s;
}
.run-btn:hover{background:var(--blue);color:#fff}

/* ── progress bar ── */
.prog-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:4px 0}
.prog-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ── invoice grid ── */
.inv-doc{
  background:var(--bg2);border:1px solid var(--border2);border-radius:4px;
  padding:16px;font-size:11px;margin-bottom:12px;position:relative;
}
.inv-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);
}
.inv-logo{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--blue)}
.inv-badge{
  text-align:right;font-size:10px;color:var(--text2);line-height:1.8;
}
.inv-badge strong{color:var(--text);display:block;font-size:13px}
.inv-table{width:100%;border-collapse:collapse;margin:10px 0}
.inv-table th{
  padding:5px 8px;text-align:left;font-size:10px;text-transform:uppercase;
  letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--border);
}
.inv-table td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text)}
.inv-total{
  text-align:right;margin-top:10px;
  font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--teal);
}
.inv-total span{font-size:10px;color:var(--text2);display:block;font-family:var(--font-mono);font-weight:400}

/* ── highlight overlays on doc ── */
.inv-doc .hl-box{
  position:absolute;border:2px solid;border-radius:2px;pointer-events:none;
  animation:hl-pulse 2s ease-in-out infinite;
}
@keyframes hl-pulse{0%,100%{opacity:.8}50%{opacity:.3}}

/* ── pipeline flow ── */
.pipeline{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:12px 0}
.pipe-step{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:3px;padding:8px 12px;font-size:11px;
  text-align:center;flex:1;min-width:80px;position:relative;
}
.pipe-step .ps-icon{font-size:18px;margin-bottom:3px}
.pipe-step .ps-label{font-family:var(--font-head);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;color:var(--text2);}
.pipe-step .ps-sub{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.4}
.pipe-arrow{color:var(--text3);font-size:14px;padding:0 4px;flex-shrink:0}

/* ── image patch grid ── */
.patch-grid{display:grid;gap:2px;margin:10px 0}
.patch{
  border-radius:2px;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:rgba(255,255,255,.6);
  transition:all .3s;cursor:pointer;aspect-ratio:1;
}

/* ── field extraction card ── */
.field-card{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);border:1px solid var(--border);border-radius:3px;
  padding:8px 12px;margin:4px 0;cursor:pointer;transition:all .2s;
}
.field-card:hover,.field-card.active{border-color:var(--blue);background:var(--blue-glow)}
.field-card .fc-key{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.field-card .fc-val{font-size:13px;color:var(--text);font-family:var(--font-head);font-weight:600}
.field-card .fc-conf{font-size:10px;padding:2px 6px;border-radius:2px}

/* ── confidence meter ── */
.conf-ring{display:inline-flex;align-items:center;gap:6px}

/* ── legend row ── */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0;font-size:10px;color:var(--text2);align-items:center}
.leg-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:3px}

/* ── scan line animation ── */
@keyframes scanY{0%{transform:translateY(0)}100%{transform:translateY(var(--scan-h,200px))}}
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
  animation:scanY 2s ease-in-out infinite alternate;
  pointer-events:none;opacity:.6;
}

/* ── flow line animation ── */
@keyframes dash{to{stroke-dashoffset:-20}}

/* ── modal overlay ── */
.modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal.open{display:flex}
.modal-box{
  background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  padding:24px;max-width:420px;width:90%;
}
.modal-title{font-family:var(--font-head);font-size:16px;font-weight:700;
  color:var(--text);margin-bottom:12px;}
.modal-close{float:right;background:none;border:none;color:var(--text2);
  font-size:18px;cursor:pointer;line-height:1}

/* ── tab strip inside panel ── */
.tab-strip{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab-btn{
  padding:7px 14px;font-size:11px;font-family:var(--font-mono);
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--text2);cursor:pointer;transition:all .15s;margin-bottom:-1px;
}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── anomaly badge ── */
.anomaly{
  display:inline-flex;align-items:center;gap:5px;
  background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;
  border-radius:2px;padding:3px 8px;font-size:10px;font-weight:500;
}
.ok-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#dcfce7;color:#15803d;border:1px solid #86efac;
  border-radius:2px;padding:3px 8px;font-size:10px;font-weight:500;
}
</style>
</head>
<body>
<div class="sim">

<!-- HEADER -->
<div class="sim-header">
  <div class="sim-title">Multimodal AI Systems</div>
  <div class="sim-badge">Interactive Simulation</div>
</div>

<!-- MODALITY PICKER -->
<div class="sec">Select Input Modality</div>
<div class="modality-bar" id="modality-bar">
  <button class="mod-btn active" onclick="setModality('text')" id="mod-text">
    <span class="mod-icon">📝</span><span class="mod-label">Text</span>
  </button>
  <button class="mod-btn" onclick="setModality('image')" id="mod-image">
    <span class="mod-icon">🖼️</span><span class="mod-label">Image</span>
  </button>
  <button class="mod-btn" onclick="setModality('table')" id="mod-table">
    <span class="mod-icon">📊</span><span class="mod-label">Table</span>
  </button>
  <button class="mod-btn" onclick="setModality('document')" id="mod-document">
    <span class="mod-icon">📄</span><span class="mod-label">Document</span>
  </button>
  <button class="mod-btn" onclick="setModality('invoice')" id="mod-invoice">
    <span class="mod-icon">🧾</span><span class="mod-label">Invoice</span>
  </button>
</div>

<!-- STAGE NAV -->
<div class="stage-nav" id="stage-nav"></div>

<!-- PANELS CONTAINER -->
<div id="panels-container"></div>

</div>

<script>
/* ─────── colour palette ─────── */
const C = {
  blue:'#2563eb', blueDim:'#dbeafe', blueGlow:'rgba(37,99,235,0.08)',
  teal:'#0d9488', tealDim:'#ccfbf1',
  amber:'#d97706', amberDim:'#fef3c7',
  purple:'#7c3aed', purpleDim:'#ede9fe',
  coral:'#dc2626', coralDim:'#fee2e2',
  green:'#16a34a', greenDim:'#dcfce7',
  pink:'#db2777', pinkDim:'#fce7f3',
  text:'#1a1d2e', text2:'#5a5f7a', text3:'#9099b8',
  bg:'#f7f8fc', bg2:'#ffffff', bg3:'#f0f2f8', bg4:'#e8eaf4',
  border:'#dde1f0', border2:'#c8ceea',
};

/* ─────── modality definitions ─────── */
const MODALITIES = {
  text:{
    label:'Text',
    stages:['Encode','Attention','Reasoning','Generate'],
    infos:[
      `<strong>Text Encoding</strong> — Raw text is tokenised into subword units, mapped to high-dim embedding vectors, then enriched with positional encoding. The result is a dense matrix passed to the transformer stack.`,
      `<strong>Cross-modal Attention</strong> — In a multimodal model, text tokens attend to <em>all other modality tokens</em> (image patches, table cells, page regions) via cross-attention heads. This grounds language in perception.`,
      `<strong>Chain-of-Thought Reasoning</strong> — The model maintains an internal scratch-pad. Token by token it builds an intermediate reasoning chain before committing to the final answer.`,
      `<strong>Text Generation</strong> — Autoregressive decoding: the model samples from the softmax probability distribution, appending each new token to the context window until an end-of-sequence token is produced.`,
    ],
    render:[renderTextEncode, renderCrossAttn, renderCoT, renderGenerate],
  },
  image:{
    label:'Image',
    stages:['Patch Embed','Vision Encoder','Cross-Attn','Caption'],
    infos:[
      `<strong>Vision Patch Embedding</strong> — Images are divided into N×N patches (e.g. 14×14 px). Each patch is flattened and projected to the same embedding dimension as text tokens — creating <em>visual tokens</em>.`,
      `<strong>Vision Transformer (ViT)</strong> — Visual tokens pass through transformer encoder layers with self-attention. The model learns which patches are semantically related — heads activate for edges, objects, faces.`,
      `<strong>Image–Text Cross-Attention</strong> — Fused multimodal layers let text tokens query visual features. "What colour is the car?" attends to car-region patches. Image tokens can also attend to question context.`,
      `<strong>Visual Grounding & Captioning</strong> — The decoder generates text conditioned on the fused representation. Bounding boxes, dense captions, and answers to visual questions are all produced this way.`,
    ],
    render:[renderPatchEmbed, renderViT, renderImgCrossAttn, renderCaption],
  },
  table:{
    label:'Table / Spreadsheet',
    stages:['Parse','Cell Encode','Row Reason','Insight'],
    infos:[
      `<strong>Table Parsing</strong> — Structured data is parsed into row × column cells. Headers are identified and typed (numeric, categorical, date). Null handling and unit normalisation happen here.`,
      `<strong>Cell Encoding</strong> — Each cell becomes a token enriched with structural metadata: (row_idx, col_idx, header_name, data_type). This lets attention heads learn row/column relationships.`,
      `<strong>Row-level Reasoning</strong> — Aggregations, comparisons, trend detection and anomaly flags are derived via attention over column-aligned cells. No symbolic code — fully neural.`,
      `<strong>Natural Language Insight</strong> — Findings are decoded into coherent English sentences with supporting numbers, ready to be embedded in reports or dashboards.`,
    ],
    render:[renderTableParse, renderCellEncode, renderRowReason, renderInsight],
  },
  document:{
    label:'Document / Report',
    stages:['OCR/Layout','Segment','Semantic','Q&A'],
    infos:[
      `<strong>OCR & Layout Analysis</strong> — A vision model detects text regions, tables, figures, and headers. OCR converts pixels → strings. Spatial coordinates (x, y, w, h) are preserved as structural tokens.`,
      `<strong>Document Segmentation</strong> — The document is split into logical blocks: title, abstract, section headings, body paragraphs, tables, captions. Each block gets a type embedding.`,
      `<strong>Semantic Indexing</strong> — Block embeddings are stored in a vector DB. At query time, the query vector retrieves the most relevant sections — RAG over the document's own content.`,
      `<strong>Document Q&A</strong> — Retrieved chunks are injected into the prompt. The model answers grounded in the source, with page/section citations.`,
    ],
    render:[renderOCR, renderSegment, renderSemantic, renderDocQA],
  },
  invoice:{
    label:'Invoice / Financial',
    stages:['Scan','Extract Fields','Validate','Report'],
    infos:[
      `<strong>Invoice Scanning</strong> — A vision encoder scans the document. Detected zones: vendor info, line items, totals, tax, due dates. Confidence scores are assigned per detected region.`,
      `<strong>Field Extraction</strong> — Structured fields are extracted using named entity recognition fused with layout attention. The model maps each field to a schema (vendor, amount, currency, date, PO number…).`,
      `<strong>Validation & Anomaly Detection</strong> — Cross-field logic checks: do line items sum to subtotal? Is the tax rate plausible? Duplicate invoice detection via embedding similarity against historical records.`,
      `<strong>Financial Report Generation</strong> — Extracted, validated data is aggregated across invoices into cash-flow summaries, overdue alerts, and vendor analytics — all generated from raw PDF inputs.`,
    ],
    render:[renderInvoiceScan, renderFieldExtract, renderValidate, renderFinancialReport],
  },
};

let currentModality = 'text';
let currentStage = 0;
let genTimer = null;

/* ─────── init ─────── */
function setModality(m){
  currentModality = m;
  currentStage = 0;
  document.querySelectorAll('.mod-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mod-'+m).classList.add('active');
  buildNav();
  buildPanels();
  activateStage(0);
}

function buildNav(){
  const stages = MODALITIES[currentModality].stages;
  const nav = document.getElementById('stage-nav');
  nav.innerHTML = stages.map((s,i)=>
    `<button class="stage-btn${i===0?' active':''}" onclick="activateStage(${i})">${i+1} · ${s}</button>`
  ).join('');
}

function buildPanels(){
  const stages = MODALITIES[currentModality].stages;
  const infos  = MODALITIES[currentModality].infos;
  const cont   = document.getElementById('panels-container');
  cont.innerHTML = stages.map((s,i)=>
    `<div class="panel${i===0?' active':''}" id="panel-${i}">
       <div class="info-bar">${infos[i]}</div>
       <div id="panel-body-${i}"></div>
     </div>`
  ).join('');
}

function activateStage(i){
  currentStage = i;
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  document.querySelectorAll('.stage-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  // render body
  MODALITIES[currentModality].render[i]();
}

/* ══════════════════════════════════════════════
   TEXT MODALITY RENDERERS
══════════════════════════════════════════════ */
function renderTextEncode(){
  const el = document.getElementById('panel-body-0');
  const text = 'Analyse the quarterly revenue trend';
  const tokens = text.replace(/[.,!?]/g,'').split(/\s+/);
  const colors = [C.blue,C.teal,C.amber,C.purple,C.coral,C.green,C.pink];
  let html = `<div class="sec">Tokenisation</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">`;
  tokens.forEach((t,i)=>{
    const col = colors[i%colors.length];
    const id = simHash(t)%50000+500;
    html += `<div style="background:${col}18;border:1px solid ${col}40;border-radius:3px;
      padding:5px 10px;font-size:11px;cursor:default;transition:all .2s"
      onmouseover="this.style.background='${col}30'"
      onmouseout="this.style.background='${col}18'">
      <div style="color:${col};font-weight:700">${t}</div>
      <div style="font-size:9px;color:${C.text3};margin-top:2px">id:${id}</div>
    </div>`;
  });
  html += `</div><div class="sec">Embedding matrix (8 dims shown)</div>`;
  html += `<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:10px;width:max-content">`;

function runTextGen(){
  const q = document.getElementById('gen-q').value.toLowerCase();
  let resp = 'Revenue grew consistently across all four quarters: Q1 $2.1M → Q2 $2.4M → Q3 $2.8M → Q4 $3.2M — representing a compound quarterly growth rate of approximately 15%. The bar chart confirms an unbroken upward trend with no anomalies. H2 performance was particularly strong, accounting for 58% of full-year revenue.';
  if(q.includes('tax')||q.includes('vat')) resp = 'Total tax liability across all invoices is $4,820 at an effective blended rate of 8.3%. No anomalous tax rates detected. Two invoices carry a 0% rate (export exemptions).';
  if(q.includes('vendor')) resp = 'Top vendors by spend: Acme Corp $24,500 (31%), TechSupplies Ltd $18,200 (23%), GlobalParts $14,100 (18%). Remaining 28% is spread across 9 vendors.';
  const out = document.getElementById('gen-out');
  out.innerHTML = '';
  if(genTimer) clearInterval(genTimer);
  let i=0;
  genTimer = setInterval(()=>{
    if(i>=resp.length){clearInterval(genTimer);showTokenProbs();return;}
    out.innerHTML = resp.slice(0,++i) + '<span class="cursor"></span>';
  },18);
}

function showTokenProbs(){
  const cands = ['growth','increase','rise','surge','trend','trajectory'];
  const probs = cands.map(w=>({w,p:Math.random()}));
  const sum = probs.reduce((a,b)=>a+b.p,0);
  probs.forEach(p=>p.p/=sum); probs.sort((a,b)=>b.p-a.p);
  let html = `<div style="font-size:10px;color:${C.text2};margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">Next-token distribution</div>`;
  probs.slice(0,5).forEach((p,i)=>{
    const pct = Math.round(p.p*100);
    html += `<div style="display:flex;align-items:center;gap:8px;margin:3px 0">
      <span style="font-family:var(--font-mono);min-width:90px;font-size:11px;color:${i===0?C.blue:C.text2}">${p.w}</span>
      <div style="flex:1;background:${C.bg4};border-radius:2px;height:6px">
        <div style="width:${pct*2.5}px;max-width:100%;height:6px;border-radius:2px;background:${i===0?C.blue:C.text3}"></div>
      </div>
      <span style="font-size:10px;color:${C.text2};min-width:28px">${pct}%</span>
    </div>`;
  });
  document.getElementById('gen-prob').innerHTML = html;
}

    <strong>⚠ Action required:</strong> PO-7721 could not be matched in the approved PO registry. Invoice is flagged for manual review before payment approval.
  </div>`;
  el.innerHTML = html;
}

  let html = `<div class="sec">Aggregated Financial Dashboard</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
    ${[
      {label:'Total Invoices',val:'37',col:C.blue},
      {label:'Total Spend',val:'$78,200',col:C.teal},

      padding:10px 12px;text-align:center">
      <div style="font-size:10px;color:${C.text2};text-transform:uppercase;letter-spacing:.8px">${m.label}</div>
      <div style="font-family:var(--font-head);font-size:20px;font-weight:800;color:${m.col};margin-top:4px">${m.val}</div>

      <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px">
        <span style="color:${v.col}">${v.name}</span>
        <span style="color:${C.text2}">$${v.spend.toLocaleString()} · ${pct}%</span>
      </div>
      <div class="prog-bar">
        <div class="prog-fill" style="width:${pct*2}%;max-width:100%;background:${v.col}"></div>
      </div>
    </div>`;
  });
  html += `<div style="margin-top:12px">
    <div class="sec">AI-Generated Report</div>
    <div class="qa-row">
      <div class="qa-label">Ask</div>
      <input class="qa-inp" id="fin-q" value="Which vendor is overdue?"/>
      <button class="run-btn" onclick="runFinReport()">Generate ↗</button>
    </div>
    <div class="output-box" id="fin-out" style="min-height:60px">
      <span style="color:${C.text3}">Ask a question about the aggregated invoice data…</span>
    </div>
  </div>`;
  el.innerHTML = html;
}

function runFinReport(){
  const q = document.getElementById('fin-q').value.toLowerCase();
  let resp = 'No vendors are currently overdue based on the extracted due dates. The next due date is 15 Dec 2024 (INV-2024-0842 · Acme Corp · $3,780). One invoice (INV-2024-0781) is flagged for a missing PO reference and pending manual review.';
  if(q.includes('tax')) resp = 'Total tax across all 37 invoices: $4,820 at a blended effective rate of 8.3%. Two invoices carry a 0% rate under export exemption rules. No anomalous tax rates detected.';
  if(q.includes('top')||q.includes('largest')) resp = 'Top vendor by spend: Acme Corp at $24,500 (31.3% of total). Largest single invoice: INV-2024-0701 · GlobalParts · $5,200 for industrial components.';
  if(q.includes('flag')) resp = '2 invoices are flagged: (1) INV-2024-0842 — PO number not in registry (requires approval). (2) INV-2024-0614 — duplicate detected (cosine similarity 0.96 vs INV-2024-0501). Both paused for review.';
  const out = document.getElementById('fin-out');
  out.innerHTML = '';
  let i=0;
  if(genTimer) clearInterval(genTimer);
  genTimer = setInterval(()=>{
    if(i>=resp.length){clearInterval(genTimer);return;}
    out.innerHTML = resp.slice(0,++i);
  },18);
}

/* ─────── utilities ─────── */
function simHash(s){
  let h=0;
  for(let c of s) h=(h*31+c.charCodeAt(0))&0xffffffff;
  return Math.abs(h);
}

function randVec(seed,n=12){
  const v=[]; let s=seed;
  for(let i=0;i<n;i++){
    s=(s*1664525+1013904223)&0xffffffff;
    v.push(((s>>>16)/65535)*2-1);
  }
  return v;
}
